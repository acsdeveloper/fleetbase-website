name: Live Deployment via SSH

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.branch == 'main'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Inject Google Analytics
        run: |
          GA_SNIPPET='<script async src="https://www.googletagmanager.com/gtag/js?id=G-N8ER3NY2XD"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-N8ER3NY2XD");</script>'
          
          find . -name "*.html" | while read -r file; do
            if ! grep -q "G-N8ER3NY2XD" "$file"; then
              sed -i "s@</head>@${GA_SNIPPET}</head>@g" "$file"
            fi
          done
      - name: Copy files to server via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME || 'ubuntu' }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "."
          target: "/var/www/html/fleetyes.com/htdocs"
          overwrite: true
          rm: true
          exclude: |
            .git*
            .github*
            node_modules
