name: Live Deployment via SSH

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.branch == 'main'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Inject Google Analytics
        run: |
          # Define the snippet
          GA_SNIPPET='<script async src="https://www.googletagmanager.com/gtag/js?id=G-N8ER3NY2XD"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-N8ER3NY2XD");</script>'
          
          # Use a different delimiter (like @) to avoid clashing with / in the HTML
          # We find all .html files and replace the closing </head> tag
          find . -name "*.html" -exec sed -i "s@</head>|${GA_SNIPPET}\n</head>@g" {} +

      - name: Copy files to server via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME || 'ubuntu' }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "."
          target: "/var/www/html/fleetyes.com/htdocs"
          overwrite: true
